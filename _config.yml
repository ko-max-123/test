title: "Uehara Lab"
description: "上原研究室 | University of Kitakyushu"
lang: ja
timezone: Asia/Tokyo

# GitHub Pages のユーザー/組織サイトなら空でOK。
# プロジェクトページ https://USER.github.io/REPO/ で公開する場合は "/REPO" に変更してください。
baseurl: ""
url: ""

markdown: kramdown

collections:
  members:
    output: true
    permalink: /members/:name/
  news:
    output: true
    permalink: /news/:name/

defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: ""
      type: "members"
    values:
      layout: member
      active_nav: members
  - scope:
      path: ""
      type: "news"
    values:
      layout: news
      active_nav: news

exclude:
  - README.md
  - LOCAL_SETUP.md
  - LLM_HANDOFF.md
  - Gemfile
  - Gemfile.lock
  - vendor
