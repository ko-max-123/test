hero:
  label: "About Uehara Lab"
  title_line1: "数理情報とセキュリティで、"
  title_line2: "信頼できる情報技術の基盤を探究する"
  description: "上原研究室では、情報理論、符号理論、系列生成、擬似乱数生成などの数理的基盤をもとに、情報セキュリティや信頼性の高い情報システムに関する研究を行っています。理論の理解だけでなく、実装・実験・評価を通して、安全で信頼できる情報技術のあり方を探究します。"
  fields: "Information Theory / Coding Theory / Sequences / Security"

mission:
  title: "研究室の目的"
  paragraphs:
    - "上原研究室では、情報理論、符号理論、系列生成、擬似乱数生成、暗号・情報セキュリティといった分野を対象に、理論的な理解と実践的な応用の両面から研究を進めています。必要に応じて、画像処理や認証技術なども情報セキュリティ応用の一例として扱います。"
    - "研究活動では、文献調査、数理的な考察、プログラムによる実装、実験結果の分析、発表資料や論文としての整理を重視します。学生一人ひとりが自ら課題を見つけ、考え、検証し、研究を通して問題解決力と技術力を身につけることを目指しています。"

values:
  - icon: "functions"
    title: "理論"
    text: "情報理論、符号理論、系列生成など、情報技術を支える数理的な基盤を学びます。"
  - icon: "shield"
    title: "セキュリティ"
    text: "暗号や擬似乱数生成、認証方式など、情報を守る技術を探究します。"
  - icon: "terminal"
    title: "実装と評価"
    text: "プログラムを作成し、実験やデータ分析を通して技術の有効性を検証します。"

themes:
  - icon: "hub"
    title: "情報理論・符号理論"
    text: "通信や記録の過程で発生する誤りを検出・訂正するための理論について学びます。ディジタル情報を正確に伝え、保存するための基盤技術として、符号の構成法や性能評価を扱います。"
  - icon: "casino"
    title: "系列・擬似乱数生成"
    text: "暗号、通信、シミュレーション、ゲーム、統計的サンプリングなどに利用される系列や擬似乱数生成について研究します。予測困難性や安全性、実用上の品質評価を通して、信頼できる乱数生成技術の理解を深めます。"
  - icon: "calculate"
    title: "代数学と暗号理論"
    text: "群論や体論などの代数学的な考え方を、符号理論、暗号、系列生成を支える数理的基盤として学びます。数学的な構造を理解し、それが安全な通信やデータ保護にどのように応用されるかを探究します。"
  - icon: "security"
    title: "情報セキュリティ"
    text: "デジタル情報を安全に扱うための技術について研究します。暗号、認証、脅威分析、攻撃への耐性評価などを対象に、安全な情報システムを実現するための仕組みを考えます。"
  - icon: "image_search"
    title: "画像処理とセキュリティ応用"
    text: "画像処理や画像認識技術を、認証・識別・安全性評価などのセキュリティ応用の観点から扱います。画像やAIそのものを主専門とするのではなく、情報を安全に扱うための応用技術として位置づけます。"
