hero:
  label: "About Uehara Lab"
  title_line1: "数学から始まる、"
  title_line2: "符号の世界"
  description: "上原研究室では、情報代数、擬似乱数系列、誤り訂正情報セキュリティなどの数理的基盤をもとに、信頼性の高い情報システムに関する研究を行っています。理論の理解に加え、実装と評価を通して、安全で安定し、効率的で信頼できる情報技術のあり方を探究します。"
  fields: "Information Algebra / Pseudorandom Sequences / Error-Correcting Information Security"

mission:
  title: "研究室の目的"
  paragraphs:
    - "上原研究室では、情報代数、擬似乱数系列、誤り訂正情報セキュリティを中心とした数理的な考え方をもとに、情報を正確に伝え、安全に扱うための技術について研究しています。暗号や電子透かしなどのテーマを通して、理論と実装の両面から信頼できる情報技術の基盤を探究します。"
    - "研究活動では、文献調査、数理的な考察、プログラムによる実装、実験結果の分析、発表資料や論文としての整理を重視します。学生一人ひとりが自ら課題を見つけ、考え、検証し、研究を通して問題解決力と技術力を身につけることを目指しています。"

values:
  - icon: "functions"
    title: "理論"
    text: "情報代数、擬似乱数系列、誤り訂正情報セキュリティなど、情報技術を支える数理的な基盤を学びます。"
  - icon: "shield"
    title: "セキュリティ"
    text: "暗号や擬似乱数系列、認証方式など、情報を守る技術を探究します。"
  - icon: "terminal"
    title: "実装と評価"
    text: "プログラムを作成し、実験やデータ分析を通して技術の有効性を検証します。"

themes:
  - icon: "hub"
    title: "誤り訂正情報セキュリティ"
    text: "通信や記録の過程で発生する誤りを検出・訂正するための理論について学びます。ディジタル情報を正確に伝え、保存するための基盤技術として、符号の構成法や性能評価を扱います。"
  - icon: "casino"
    title: "擬似乱数系列"
    text: "暗号、通信、シミュレーション、ゲーム、統計的サンプリングなどに利用される擬似乱数系列について研究します。予測困難性や安全性、実用上の品質評価を通して、信頼できる乱数技術の理解を深めます。"
  - icon: "calculate"
    title: "情報代数"
    text: "群論や体論などを扱う情報代数の考え方を、誤り訂正情報セキュリティ、暗号、擬似乱数系列を支える数理的基盤として学びます。数学的な構造を理解し、それが安全な通信やデータ保護にどのように応用されるかを探究します。"
  - icon: "security"
    title: "情報セキュリティ"
    text: "デジタル情報を安全に扱うための技術について研究します。暗号、認証、脅威分析、攻撃への耐性評価などを対象に、安全な情報システムを実現するための仕組みを考えます。"
  - icon: "image_search"
    title: "画像処理とセキュリティ応用"
    text: "画像処理や画像認識技術を、認証・識別・安全性評価などのセキュリティ応用の観点から扱います。画像やAIそのものを主専門とするのではなく、情報を安全に扱うための応用技術として位置づけます。"
