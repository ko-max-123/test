fit:
  - icon: "psychology"
    title: "仕組みを考えるのが好き"
    text: "情報理論、符号理論、暗号、乱数、系列生成などの背景にある仕組みに興味がある人に向いています。"
  - icon: "terminal"
    title: "手を動かして確かめたい"
    text: "プログラムを書き、実験し、結果を表やグラフで確認する研究に関心がある人に向いています。"
  - icon: "shield"
    title: "セキュリティに関心がある"
    text: "安全な情報システム、認証、暗号、攻撃への耐性評価などに興味がある人に向いています。"
prepare:
  - title: "プログラミング"
    icon: "code"
    items: ["Pythonの基本文法", "CSVなどのデータファイルの読み書き", "簡単なグラフ作成"]
  - title: "数学・情報理論"
    icon: "functions"
    items: ["線形代数の基礎", "確率・統計の基礎", "符号理論、暗号、乱数への興味"]
  - title: "調査・文章化"
    icon: "edit_note"
    items: ["調べた内容をメモにまとめる", "分からない点を質問にする", "発表資料を作って説明する"]

flow:
  - title: "興味の整理"
    text: "情報理論、符号理論、暗号、乱数、系列生成、セキュリティ応用などの中から、関心のある分野を整理します。最初から明確な研究テーマが決まっていなくても構いません。"
  - title: "先行研究・関連技術の調査"
    text: "論文や技術資料を読み、既存手法の考え方や課題を整理します。調べた内容はメモや発表資料にまとめ、ゼミで共有します。"
  - title: "実装・実験"
    text: "必要に応じてプログラムを作成し、提案手法や既存手法の動作を確認します。実験結果は表やグラフに整理し、比較・評価します。"
  - title: "分析・発表・卒業研究として整理"
    text: "得られた結果をもとに考察を行い、発表資料や卒業論文としてまとめます。背景、目的、方法、結果、考察を筋道立てて説明できることを目指します。"
