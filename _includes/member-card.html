<a href="{{ include.url | relative_url }}" aria-label="{{ include.name }}の詳細ページへ"
   class="group flex flex-col bg-white dark:bg-slate-900 rounded-xl overflow-hidden border border-slate-200 dark:border-slate-800 hover:shadow-lg transition-all cursor-pointer no-underline focus:outline-none focus:ring-4 focus:ring-primary/20 focus:ring-offset-2">
  <div class="aspect-square bg-slate-100 dark:bg-slate-800 flex items-center justify-center overflow-hidden">
    {% if include.image and include.image != '' %}
      <img src="{{ include.image | relative_url }}" alt="{{ include.name }}のプロフィール画像" class="w-full h-full object-cover" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
      <div class="hidden w-full h-full items-center justify-center">
        <span class="material-symbols-outlined text-5xl text-slate-300 dark:text-slate-600">person</span>
      </div>
    {% else %}
      <span class="material-symbols-outlined text-5xl text-slate-300 dark:text-slate-600">person</span>
    {% endif %}
  </div>
  <div class="p-4 text-center">
    <p class="text-xs font-bold text-primary dark:text-accent uppercase tracking-wider mb-1">{{ include.grade }}</p>
    <h3 class="text-base font-bold text-slate-900 dark:text-slate-100">{{ include.name }}</h3>
    <p class="text-xs text-slate-500 dark:text-slate-400 mt-2">{{ include.research_title }}</p>
  </div>
</a>
