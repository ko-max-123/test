<article class="group rounded-2xl border border-slate-200 bg-white p-6 hover:shadow-soft hover:border-primary/40 transition-all">
  <a href="{{ include.item.url | relative_url }}" class="{% if include.item.image %}grid md:grid-cols-[240px_1fr] gap-6{% else %}block{% endif %}">
    {% if include.item.image %}
      <div class="rounded-xl overflow-hidden bg-slate-100 aspect-[16/10] md:aspect-auto">
        <img src="{{ include.item.image | relative_url }}" alt="{{ include.item.image_alt | default: include.item.title }}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" />
      </div>
    {% endif %}
    <div>
      <div class="flex flex-wrap items-center gap-3 mb-3">
        <time class="text-slate-400 text-sm font-medium">{{ include.item.date | date: "%Y.%m.%d" }}</time>
        <span class="px-3 py-1 bg-slate-100 text-[10px] font-bold uppercase tracking-wider rounded-full">{{ include.item.category }}</span>
      </div>
      <h2 class="text-xl md:text-2xl font-bold text-lab-navy group-hover:text-primary transition-colors leading-snug">{{ include.item.title }}</h2>
      <p class="mt-3 text-slate-600 leading-relaxed">{{ include.item.summary }}</p>
      <span class="mt-5 inline-flex items-center gap-2 text-primary font-bold text-sm">
        詳細を見る <span class="material-symbols-outlined text-base">arrow_forward</span>
      </span>
    </div>
  </a>
</article>
