---
layout: default
---
<main class="pt-20">
  <section class="bg-slate-50 border-b border-slate-100">
    <div class="max-w-7xl mx-auto px-6 py-14 md:py-20">
      <nav aria-label="Breadcrumb" class="flex items-center gap-2 text-sm text-slate-500 mb-8">
        <a class="hover:text-primary transition-colors" href="{{ '/' | relative_url }}">Home</a>
        <span class="material-symbols-outlined text-base">chevron_right</span>
        <span class="text-primary font-medium">{{ page.title }}</span>
      </nav>
      <h1 class="text-4xl md:text-6xl font-black tracking-tight text-lab-navy leading-tight">{{ page.title }}</h1>
      {% if page.description %}<p class="mt-5 text-lg text-slate-600 leading-relaxed max-w-3xl">{{ page.description }}</p>{% endif %}
    </div>
  </section>
  {{ content }}
</main>
